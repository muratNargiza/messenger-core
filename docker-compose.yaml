version: '3.8'

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      - DSN=postgres://postgres:postgres@db:5432/users?sslmode=disable
      - JWT_SECRET=your-secure-jwt-secret-key-change-me
      - JWT_TTL=24h
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=users
    ports:
      - "5440:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
